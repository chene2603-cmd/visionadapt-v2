<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的项目名</title>
  <!-- 必须保留 base 标签，Flutter 路由依赖它 -->
  <base href="/">
  <!-- 可选：添加 Favicon -->
  <link rel="icon" href="favicon.png">
  <style>
    /* 可选：基本样式，防止页面闪烁时背景异常 */
    body, html {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #000000;
      width: 100%;
      height: 100%;
      overflow: hidden; /* 防止滚动条 */
    }
    /* Flutter 应用容器占满全屏 */
    #flutter_app {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <!-- Flutter 应用挂载点，
       id 必须与 Flutter 初始化代码中的
       一致 -->
  <div id="flutter_app"></div>
  <!-- 加载 Flutter 编译后的主
       脚本（必须闭合） -->
  <script src="main.dart.js" type="application/javascript"></script>
</body>
</html>
